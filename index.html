<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Watch Video</title>

<style>
    body {
        margin: 0;
        background: black;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .video-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    iframe {
        width: 100vw;
        height: calc(100vw * 9 / 16); /* perfect 16:9 ratio */
        max-height: 100vh;
        border: none;
    }
</style>
</head>

<body>

<div class="video-wrapper">
<iframe
src="https://www.youtube.com/embed/vs0rMt7uaa0"
allowfullscreen>
</iframe>
</div>

</body>
</html>
