<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Watch Video</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* container fits phone screen */
.container{
    position:relative;
    width:100vh;
    height:100vw;
    transform:rotate(90deg);
    transform-origin:center;
}

/* video fits fully (NO CUT) */
.container iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="container">
<iframe
src="https://www.youtube.com/embed/vs0rMt7uaa0?modestbranding=1&rel=0&iv_load_policy=3"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>
</div>

</body>
</html>
