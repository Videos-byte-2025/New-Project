<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Watch Video</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* container centered */
.wrapper{
    position:relative;
    width:100vh;
    height:56.25vh; /* 16:9 ratio */
    transform:rotate(90deg);
}

/* video fills perfectly */
.wrapper iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="wrapper">
<iframe
src="https://www.youtube.com/embed/vs0rMt7uaa0"
allowfullscreen>
</iframe>
</div>

</body>
</html>
