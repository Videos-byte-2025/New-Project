<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Watch Video</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* rotate whole viewport correctly */
.screen {
    position:fixed;
    width:100vh;
    height:100vw;
    top:0;
    left:0;
    transform-origin:0 0;
    transform:rotate(90deg) translateY(-100%);
}

/* video fills screen */
.screen iframe {
    width:100%;
    height:100%;
    border:0;
}

/* ===== UNCLICKABLE AREAS (INSIDE ROTATED SCREEN) ===== */
.block-top,
.block-bottom{
    position:absolute;
    left:0;
    width:100%;
    height:80px; /* adjust if needed */
    z-index:10;
    background:transparent;
}

/* top of horizontal video */
.block-top{
    top:0;
}

/* bottom of horizontal video */
.block-bottom{
    bottom:0;
}
</style>
</head>

<body>

<div class="screen">

<iframe
src="https://www.youtube.com/embed/7oO-0L7DqVg"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

<!-- unclickable overlays (MUST be here) -->
<div class="block-top"></div>
<div class="block-bottom"></div>

</div>

</body>
</html>
