<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
    body {
        margin: 0;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Responsive video container */
    .video-container {
        position: relative;
        width: 100%;
        max-width: 1000px;
        aspect-ratio: 16 / 9; /* keeps perfect size */
    }

    .video-container iframe {
        position: absolute;
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>

<body>

<div class="video-container">
    <iframe
        src="https://www.youtube.com/embed/vs0rMt7uaa0"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
