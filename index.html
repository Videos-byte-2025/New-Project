<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Video</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

/* Full screen container */
.video-container{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* Make video cover entire screen */
.video-container iframe{
    position:absolute;
    top:50%;
    left:50%;
    width:177.78vh; /* 16:9 ratio */
    height:100vh;
    transform:translate(-50%, -50%);
    border:none;
}

/* If screen is wider */
@media (min-aspect-ratio:16/9){
    .video-container iframe{
        width:100vw;
        height:56.25vw;
    }
}
</style>
</head>

<body>

<div class="video-container">
<iframe
src="https://www.youtube.com/embed/vs0rMt7uaa0"
allowfullscreen>
</iframe>
</div>

</body>
</html>
